name: Тест деплоя SCP

on:
  workflow_dispatch:

jobs:
  test-scp:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Создать тестовый файл
        run: echo "scp-test-$(date -u +%Y-%m-%dT%H:%M:%SZ)" > scp_test.txt

      - name: Deploy тестового файла via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          source:   "scp_test.txt"
          target:   /home/c/cl66138/russia-flights/public_html/
          overwrite: true

      - name: Проверить что файл доступен по HTTP
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://russia-flights.ru/russia-flights/scp_test.txt)
          echo "HTTP статус: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Файл доступен — SCP работает!"
          else
            echo "✗ Файл недоступен (HTTP $STATUS)"
            exit 1
          fi
