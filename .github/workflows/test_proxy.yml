name: Тест FTPS деплоя

on:
  workflow_dispatch:  # только ручной запуск

jobs:
  test-ftps:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS (explicit, port 21)
        id: ftps1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_HOST }}
          username:   ${{ secrets.FTP_USER }}
          password:   ${{ secrets.FTP_PASS }}
          secure:     true
          local-dir:  ./
          server-dir: /russia-flights/public_html/
          timeout: 60000
          exclude: |
            **/.git/**
            **/.github/**
            **/update_routes.py
            **/README.md

      - name: Итог
        run: |
          if [ "${{ steps.ftps1.outcome }}" == "success" ]; then
            echo "✓ FTPS (explicit) сработал"
          else
            echo "✗ FTPS (explicit) не сработал"
          fi