name: Обновление маршрутов

on:
  schedule:
    # 1-го и 15-го числа каждого месяца в 00:00 UTC
    - cron: '0 0 1,15 * *'
  # Ручной запуск через интерфейс GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          OPENSKY_CLIENT_ID:     ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          AIRLABS_KEY:           ${{ secrets.AIRLABS_KEY }}
          AERODATABOX_KEY:       ${{ secrets.AERODATABOX_KEY }}
        run: |
          timeout 1200 python update_routes.py || echo "Script timed out or failed"

      - name: Commit routes.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routes.json
          git diff --staged --quiet \
            && echo "Маршруты не изменились, коммит не нужен" \
            || git commit -m "Обновление маршрутов $(date -u +%Y-%m-%d)"
          git push