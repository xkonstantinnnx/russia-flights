name: Обновление маршрутов

on:
  schedule:
    # 1-го и 15-го числа каждого месяца в 00:00 UTC
    - cron: '0 0 1,15 * *'
  # Ручной запуск через интерфейс GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        env:
          OPENSKY_CLIENT_ID:     ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          AIRLABS_KEY:           ${{ secrets.AIRLABS_KEY }}
          AERODATABOX_KEY:       ${{ secrets.AERODATABOX_KEY }}
          YANDEX_RASP_KEY:       ${{ secrets.YANDEX_RASP_KEY }}
        # 50 мин — внутренний timeout обязан сработать раньше timeout-minutes
        # джобы (60), иначе GitHub убьёт джобу целиком и шаг коммита не выполнится.
        # Падение/таймаут скрипта делает шаг красным (видно в Actions),
        # но частичные результаты всё равно коммитятся — см. if: always() ниже.
        run: |
          timeout 3000 python update_routes.py

      - name: Commit routes.json if changed
        # Скрипт сохраняет routes.json после каждого источника; при падении
        # или таймауте коммитим то, что успело сохраниться (данные не теряются —
        # неопрошенные города сохраняют старые маршруты).
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routes.json
          git diff --staged --quiet \
            && echo "Маршруты не изменились, коммит не нужен" \
            || git commit -m "Обновление маршрутов $(date -u +%Y-%m-%d)"
          git push
