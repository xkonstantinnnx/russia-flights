name: Обновление маршрутов

on:
  schedule:
    # Каждый понедельник в 04:00 UTC
    - cron: '0 4 * * 1'
  # Ручной запуск через интерфейс GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          OPENSKY_USER: ${{ secrets.OPENSKY_USER }}
          OPENSKY_PASS: ${{ secrets.OPENSKY_PASS }}
        run: python update_routes.py

      - name: Commit routes.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routes.json
          # Коммитим только если файл изменился
          git diff --staged --quiet \
            && echo "Маршруты не изменились, коммит не нужен" \
            || git commit -m "Обновление маршрутов $(date -u +%Y-%m-%d)"
          git push
