name: Обновление маршрутов

on:
  schedule:
    # Каждый понедельник в 04:00 UTC
    - cron: '0 4 * * 1'
  # Ручной запуск через интерфейс GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          OPENSKY_CLIENT_ID:     ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          AIRLABS_KEY:           ${{ secrets.AIRLABS_KEY }}
          TRAVELPAYOUTS_TOKEN:   ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: |
          echo "=== DNS check ==="
          nslookup auth.opensky-network.org || true
          echo "=== Curl check ==="
          curl -v --max-time 10 https://auth.opensky-network.org 2>&1 | head -30 || true
          echo "=== Running script ==="
          timeout 1200 python update_routes.py || echo "Script timed out or failed"

      - name: Commit routes.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routes.json
          git diff --staged --quiet \
            && echo "Маршруты не изменились, коммит не нужен" \
            || git commit -m "Обновление маршрутов $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy routes.json via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "routes.json"
          target: /russia-flights/public_html/
            .ftp-deploy-sync-state.json
